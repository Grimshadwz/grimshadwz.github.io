name: Format Studio Catalog
on:
  push:
    paths:
      - 'inventory.json' # Triggers only when you update your product log
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Run Markdown Engine
      run: python build_readme.py
    - name: Commit and Push Changes Live
      run: |
        git config --global user.name "ratchet-build-bot"
        git config --global user.email "bot@ratchetartstudio.com"
        git add README.md
        git commit -m "Automated Catalog Update" || exit 0
        git push
